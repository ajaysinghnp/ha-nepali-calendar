name: Release
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate release notes
        run: |
          changelog=$(awk '/^## \['"$(echo ${{ github.ref_name }} | sed 's/^v//')"'\]/ {flag=1; print; next} /^## \[/ {flag=0} flag' CHANGELOG.md)
          if [ -z "$changelog" ]; then
            changelog="No changelog entries found."
          fi
          changelog+=$'\n\n[Read the full changelog](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)'
          echo "$changelog" > CHANGELOG.md

      - name: Zip custom component directory
        run: |
          cd custom_components/nepali_calendar
          zip -r ../../nepali_calendar.zip .

      - name: Create Release and Upload Asset
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const fs = require('fs');
            const { readFile } = require('fs/promises');
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const tag = context.ref.replace('refs/tags/', '');

            const createReleaseResponse = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: changelog,
              draft: false,
              prerelease: false
            });

            const uploadUrl = createReleaseResponse.data.upload_url;
            const zipFile = await readFile('./nepali_calendar.zip');

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: createReleaseResponse.data.id,
              name: 'nepali_calendar.zip',
              data: zipFile
            });

  validate_hacs:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation (ignore brands)
        uses: hacs/action@main
        with:
          category: integration
          ignore: brands # only for validation
